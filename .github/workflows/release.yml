name: release

on:
  push:
    tags: 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/

      - run: rustup update --no-self-update stable && rustup default stable
      - run: cargo fmt --check
      - run: make xcframework

      - name: Check Cargo.toml version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "Error: tag ${TAG} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi

      - name: Archiving
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/CMacmon.xcframework CMacmon.xcframework-${{ github.ref_name }}.zip
          ls -lah CMacmon.xcframework-${{ github.ref_name }}.zip

      - name: Extract changelog entry
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES=$(awk "/^## ${VERSION}/{found=1; next} /^## /{found=0} found" changelog.md | sed '/^---$/d')
          if [ -z "$NOTES" ]; then
            echo "Error: no changelog entry found for ${VERSION}"
            exit 1
          fi
          echo "$NOTES" > release_notes.txt

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: |
            CMacmon.xcframework-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
